<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sonic AI — Ad Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Arial Black', 'Impact', sans-serif;
}

/* 9:16 TikTok/Instagram format */
.frame {
  width: 390px;
  height: 693px;
  background: #060A14;
  position: relative;
  overflow: hidden;
  border-radius: 0;
}

/* ─── BACKGROUNDS ─── */
.bg-glow {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 50% at 50% -10%, rgba(80,30,220,.45) 0%, transparent 55%),
    radial-gradient(ellipse 60% 30% at 20% 80%, rgba(41,121,255,.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 30% at 80% 80%, rgba(120,50,220,.2) 0%, transparent 60%);
  animation: bgPulse 4s ease-in-out infinite;
}
@keyframes bgPulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .75; }
}

.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(41,121,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(41,121,255,.05) 1px, transparent 1px);
  background-size: 36px 36px;
}

canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ─── CONTENT ─── */
.content {
  position: relative;
  z-index: 10;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 28px 24px;
}

/* ─── LOGO ─── */
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  animation: dropIn .7s .3s cubic-bezier(.34,1.56,.64,1) forwards;
}
.logo-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2979FF, #60C8FF);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 0 24px rgba(41,121,255,.7), 0 0 60px rgba(41,121,255,.3);
  animation: iconPulse 2s 1s infinite;
}
@keyframes iconPulse {
  0%,100% { box-shadow: 0 0 24px rgba(41,121,255,.7), 0 0 60px rgba(41,121,255,.3); }
  50%      { box-shadow: 0 0 36px rgba(96,200,255,.9), 0 0 80px rgba(96,200,255,.5); }
}
.logo-words { display: flex; flex-direction: column; }
.logo-name {
  font-size: 30px; font-weight: 900; letter-spacing: 3px; line-height: 1;
}
.logo-name .w  { color: #fff; }
.logo-name .b  { color: #60C8FF; }
.logo-tag {
  font-size: 7.5px; letter-spacing: 2.5px;
  color: rgba(96,200,255,.5); font-family: Arial, sans-serif; font-weight: 400;
  text-transform: uppercase; margin-top: 3px;
}

/* ─── DIVIDER ─── */
.divider {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(41,121,255,.5), rgba(96,200,255,.7), rgba(41,121,255,.5), transparent);
  margin: 20px 0;
  opacity: 0;
  animation: fadeIn .5s 1s forwards;
}

/* ─── THIS WEEK ─── */
.this-week {
  text-align: center;
  opacity: 0;
  animation: riseUp .6s 1.1s cubic-bezier(.34,1.56,.64,1) forwards;
}
.this-week__eyebrow {
  font-size: 11px; letter-spacing: 5px;
  color: rgba(96,200,255,.6); font-family: Arial,sans-serif;
  text-transform: uppercase; margin-bottom: 4px;
}
.this-week__big {
  font-size: 46px; font-weight: 900;
  color: #fff; letter-spacing: 1px; line-height: 1;
  text-shadow: 0 0 30px rgba(41,121,255,.4);
}
.this-week__sub {
  font-size: 13px; letter-spacing: 4px;
  color: rgba(255,255,255,.5); font-family: Arial,sans-serif;
  text-transform: uppercase; margin-top: 2px;
}

/* ─── RESULT CARDS ─── */
.results { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }

.card {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid rgba(41,121,255,.35);
  background: rgba(41,121,255,.07);
  box-shadow: 0 0 20px rgba(41,121,255,.1), inset 0 1px 0 rgba(255,255,255,.04);
  opacity: 0;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: -100%; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(96,200,255,.12), transparent);
  animation: cardShine 3s infinite;
}
@keyframes cardShine {
  0%   { left: -100%; }
  40%,100% { left: 100%; }
}
.card:nth-child(1) { animation: slideRight .6s 1.8s cubic-bezier(.34,1.56,.64,1) forwards; }
.card:nth-child(2) { animation: slideRight .6s 2.2s cubic-bezier(.34,1.56,.64,1) forwards; }

.card__badge {
  width: 46px; height: 46px; border-radius: 50%;
  background: rgba(41,121,255,.2);
  border: 2px solid #2979FF;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; color: #60C8FF;
  letter-spacing: 1px; flex-shrink: 0;
  box-shadow: 0 0 14px rgba(41,121,255,.5);
}
.card__body { flex: 1; }
.card__pct {
  font-size: 40px; font-weight: 900; line-height: 1;
  color: #60C8FF;
  text-shadow: 0 0 24px rgba(96,200,255,.7);
}
.card__lbl {
  font-size: 10px; letter-spacing: 2px;
  color: rgba(255,255,255,.45); font-family: Arial,sans-serif;
  text-transform: uppercase; margin-top: 2px;
}

/* ─── WIN ─── */
.win-row {
  display: flex; align-items: center; gap: 16px;
  margin-top: 18px;
  opacity: 0;
  animation: popBounce .7s 2.8s cubic-bezier(.34,1.56,.64,1) forwards;
}
.win-text {
  font-size: 64px; font-weight: 900; letter-spacing: 6px;
  color: #4ade80;
  text-shadow: 0 0 30px rgba(74,222,128,.7), 0 0 60px rgba(74,222,128,.3);
  animation: winGlow 1.5s 3.5s infinite;
}
@keyframes winGlow {
  0%,100% { text-shadow: 0 0 30px rgba(74,222,128,.7), 0 0 60px rgba(74,222,128,.3); }
  50%      { text-shadow: 0 0 50px rgba(74,222,128,1),  0 0 90px rgba(74,222,128,.6); }
}
.win-check {
  width: 56px; height: 56px; border-radius: 50%;
  background: #4ade80;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; color: #000; font-weight: 900;
  box-shadow: 0 0 24px rgba(74,222,128,.7);
  animation: checkPulse 1.2s 3.5s infinite;
}
@keyframes checkPulse {
  0%,100% { transform: scale(1);   box-shadow: 0 0 24px rgba(74,222,128,.7); }
  50%      { transform: scale(1.1); box-shadow: 0 0 40px rgba(74,222,128,1); }
}

/* ─── AMAZING ─── */
.amazing {
  text-align: center; margin-top: 14px;
  opacity: 0;
  animation: riseUp .6s 3.2s cubic-bezier(.34,1.56,.64,1) forwards;
}
.amazing__top {
  font-size: 14px; letter-spacing: 5px; color: #fff;
  text-transform: uppercase; font-family: Arial,sans-serif; font-weight: 700;
}
.amazing__main {
  font-size: 30px; font-weight: 900; letter-spacing: 1px;
  background: linear-gradient(90deg, #2979FF, #60C8FF, #a78bfa, #60C8FF, #2979FF);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
  animation: gradientFlow 3s 4s linear infinite;
}
@keyframes gradientFlow {
  0%   { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* ─── CONGRATS BANNER ─── */
.congrats {
  margin-top: auto;
  width: calc(100% + 56px); margin-left: -28px;
  padding: 16px 28px;
  background: linear-gradient(90deg, rgba(41,121,255,.15), rgba(96,200,255,.25), rgba(41,121,255,.15));
  border-top: 1px solid rgba(96,200,255,.4);
  border-bottom: 1px solid rgba(96,200,255,.4);
  text-align: center;
  opacity: 0;
  animation: fadeIn .6s 3.7s forwards;
  position: relative; overflow: hidden;
}
.congrats::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
  animation: bannerShine 2.5s 4.5s infinite;
}
@keyframes bannerShine {
  0%   { left: -60%; }
  100% { left: 150%; }
}
.congrats__text {
  font-size: 14px; font-weight: 900; letter-spacing: 2px;
  color: #60C8FF; text-transform: uppercase;
}
.congrats__text span { color: #fff; }

/* ─── URL ─── */
.site-url {
  margin-top: 14px;
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  color: rgba(96,200,255,.7);
  font-family: Arial,sans-serif;
  opacity: 0;
  animation: fadeIn .6s 4.2s forwards;
}

/* ─── BORDER GLOW ─── */
.border-glow {
  position: absolute; inset: 0; pointer-events: none;
  border: 1.5px solid rgba(41,121,255,.25);
  box-shadow:
    inset 0 0 40px rgba(41,121,255,.1),
    inset 0 0 100px rgba(80,30,220,.07);
}

/* ─── KEYFRAMES ─── */
@keyframes dropIn {
  from { opacity: 0; transform: translateY(-30px) scale(.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes riseUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-36px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes popBounce {
  0%  { opacity: 0; transform: scale(.4); }
  70% { transform: scale(1.15); }
  100%{ opacity: 1; transform: scale(1); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>
</head>
<body>

<div class="frame" id="frame">
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <canvas id="particles"></canvas>
  <div class="border-glow"></div>

  <div class="content">

    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-words">
        <div class="logo-name"><span class="w">SONIC</span> <span class="b">AI</span></div>
        <div class="logo-tag">AI Powered · Data Driven · Results Proven</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="this-week">
      <div class="this-week__eyebrow">⚡ This Week</div>
      <div class="this-week__big">WE ARE UP</div>
      <div class="this-week__sub">Already by</div>
    </div>

    <div class="results">
      <div class="card">
        <div class="card__badge">12X</div>
        <div class="card__body">
          <div class="card__pct" id="p1">+0.00%</div>
          <div class="card__lbl">On the 12X Account</div>
        </div>
      </div>
      <div class="card">
        <div class="card__badge">24X</div>
        <div class="card__body">
          <div class="card__pct" id="p2">+0.00%</div>
          <div class="card__lbl">On the 24X Account</div>
        </div>
      </div>
    </div>

    <div class="win-row">
      <div class="win-text">WIN</div>
      <div class="win-check">✓</div>
    </div>

    <div class="amazing">
      <div class="amazing__top">Absolutely</div>
      <div class="amazing__main">Amazing Performance!</div>
    </div>

    <div class="congrats">
      <div class="congrats__text">🏆 Congrats <span>to all our clients</span> 🔥</div>
    </div>

    <div class="site-url">🌐 www.sonicaicopyx.com</div>

  </div>
</div>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
const frame = document.getElementById('frame');

function resize() {
  canvas.width  = frame.offsetWidth;
  canvas.height = frame.offsetHeight;
}
resize();

const particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.8 + .3,
    vx: (Math.random() - .5) * .4,
    vy: -Math.random() * .6 - .15,
    alpha: Math.random() * .6 + .2,
    hue: Math.random() > .6 ? 220 : 260
  });
}

const bolts = [];
function spawnBolt() {
  const b = { x: Math.random() * canvas.width, segs: [], life: 0, maxLife: 18 + Math.random() * 10 };
  let bx = b.x, by = 0;
  for (let i = 0; i < 12; i++) {
    bx += (Math.random() - 0.5) * 28;
    by += canvas.height / 12;
    b.segs.push({ x: bx, y: by });
  }
  bolts.push(b);
}
setInterval(spawnBolt, 1800);

function drawFrame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},100%,70%,${p.alpha})`;
    ctx.fill();
  });

  for (let i = bolts.length - 1; i >= 0; i--) {
    const b = bolts[i];
    b.life++;
    const progress = b.life / b.maxLife;
    const alpha = progress < .5 ? progress * 2 : (1 - progress) * 2;
    ctx.beginPath();
    ctx.moveTo(b.x, 0);
    b.segs.forEach(s => ctx.lineTo(s.x, s.y));
    ctx.strokeStyle = `rgba(96,200,255,${alpha * .7})`;
    ctx.lineWidth = 1.2;
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#60C8FF';
    ctx.stroke();
    ctx.shadowBlur = 0;
    if (b.life >= b.maxLife) bolts.splice(i, 1);
  }

  requestAnimationFrame(drawFrame);
}
drawFrame();

function animateCounter(el, target, decimals, delay) {
  setTimeout(() => {
    const dur = 900;
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / dur, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = '+' + (target * ease).toFixed(decimals) + '%';
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = '+' + target.toFixed(decimals) + '%';
    }
    requestAnimationFrame(tick);
  }, delay);
}

animateCounter(document.getElementById('p1'), 2.57, 2, 1900);
animateCounter(document.getElementById('p2'), 5.14, 2, 2300);
</script>
</body>
</html>
