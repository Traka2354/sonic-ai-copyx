<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:1" />
    </linearGradient>
    <!-- Blue electric gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dark bg for standalone use -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A0A0B;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <!-- Speed ring decorations -->
  <ellipse cx="100" cy="100" rx="78" ry="20" fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.25"/>
  <ellipse cx="100" cy="100" rx="78" ry="20" fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.15" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="100" rx="78" ry="20" fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.15" transform="rotate(-60 100 100)"/>

  <!-- Lightning bolt "S" — original speed symbol -->
  <!-- Top-left bar of S -->
  <path d="M 68 52
           L 130 52
           L 115 78
           L 80 78
           Z"
        fill="url(#goldGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Middle connector -->
  <path d="M 80 78
           L 115 78
           L 125 100
           L 75 100
           Z"
        fill="url(#blueGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Bottom-right bar of S -->
  <path d="M 75 100
           L 125 100
           L 110 126
           L 65 126
           Z"
        fill="url(#goldGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Speed lines (motion lines to the left) -->
  <line x1="38" y1="64" x2="58" y2="64" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="72" x2="58" y2="72" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="38" y1="80" x2="58" y2="80" stroke="url(#blueGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Speed lines (bottom right) -->
  <line x1="118" y1="136" x2="145" y2="136" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="118" y1="144" x2="152" y2="144" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="118" y1="152" x2="145" y2="152" stroke="url(#blueGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- AI dot — small glowing orb -->
  <circle cx="138" cy="62" r="7" fill="url(#blueGrad)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="138" cy="62" r="3" fill="#ffffff" opacity="0.8"/>

  <!-- "SONIC AI" wordmark below the icon -->
  <text x="100" y="168" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="16" font-weight="900" letter-spacing="3"
        fill="url(#goldGrad)">SONIC AI</text>
  <text x="100" y="182" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="7.5" font-weight="600" letter-spacing="5"
        fill="#00BFFF" opacity="0.85">COPYX</text>
</svg>
