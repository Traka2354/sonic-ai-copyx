name: Fix Pages Custom Domain
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-pages-domain.yml'
jobs:
  fix-domain:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Set custom domain via GitHub API
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"cname":"sonicaicopyx.com","https_enforced":true}' \
            | tee /tmp/pages_result.json
          cat /tmp/pages_result.json
